services:
  - type: web
    name: wildfire-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wildfire-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: MODEL_PATH
        value: models/best_model_pipeline.joblib
      - key: WEATHER_API_KEY
        sync: false
      - key: WEATHER_API_BASE_URL
        value: https://api.openweathermap.org/data/2.5/weather
      - key: WEATHER_FORECAST_URL
        value: https://api.openweathermap.org/data/2.5/forecast
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app

  - type: web
    name: wildfire-frontend
    env: static
    plan: free
    staticPublishPath: ./static
    routes:
      - type: rewrite
        source: /
        destination: /index.html

databases:
  - name: wildfire-db
    plan: free
    databaseName: wildfire_db
    user: wildfire_user
